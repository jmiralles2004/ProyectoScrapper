# Configuración Nginx

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Verificación de salud del proxy
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-proxy"}';
            add_header Content-Type application/json;
        }

        # Redirigir /auth a /auth/
        location = /auth {
            return 308 /auth/;
        }

        # Endpoints de autenticación de la Fase 1
        location /auth/ {
            proxy_pass http://auth-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirigir /profiles a /profiles/
        location = /profiles {
            return 308 /profiles/;
        }

        # Endpoints de perfiles de la Fase 2
        location /profiles/ {
            proxy_pass http://profile-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirigir /integration a /integration/
        location = /integration {
            return 308 /integration/;
        }

        # Endpoints de integración de la Fase 6
        location /integration/ {
            proxy_pass http://integration-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ruta por defecto (404)
        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json;
        }
    }
}
# Red compartida para que los servicios se comuniquen
networks:
  jobmatch-network:
    driver: bridge

# Volúmenes para persistencia de datos
volumes:
  postgres_data:     # Almacenamiento de base de datos
  minio_data:        # Almacenamiento de archivos
  qdrant_data:       # Almacenamiento de vectores

services:

  # Base de datos PostgreSQL con extensión pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobmatch-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - jobmatch-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Almacenamiento de objetos (archivos)
  minio:
    image: minio/minio:latest
    container_name: jobmatch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - jobmatch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Base de datos vectorial para búsquedas semánticas
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jobmatch-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - jobmatch-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Servicio de autenticación de la Fase 1
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: jobmatch-auth-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "${AUTH_SERVICE_PORT:-8000}:8000"
    networks:
      - jobmatch-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Servicio de perfiles de la Fase 2
  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    container_name: jobmatch-profile-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PROFILES: ${MINIO_BUCKET_PROFILES:-profiles}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-spa+eng}
      OCR_DPI: ${OCR_DPI:-300}
    ports:
      - "${PROFILE_SERVICE_PORT:-8001}:8000"
    networks:
      - jobmatch-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Servicio de integración de la Fase 6
  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    container_name: jobmatch-integration-service
    environment:
      QDRANT_URL: ${QDRANT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTEGRATION_VECTOR_SIZE: ${INTEGRATION_VECTOR_SIZE:-384}
      QDRANT_COLLECTION_PROFILES: ${QDRANT_COLLECTION_PROFILES:-profile_vectors}
      QDRANT_COLLECTION_OFFERS: ${QDRANT_COLLECTION_OFFERS:-offer_vectors}
      INTEGRATION_INGEST_API_KEY: ${INTEGRATION_INGEST_API_KEY:-}
    ports:
      - "${INTEGRATION_SERVICE_PORT:-8002}:8000"
    networks:
      - jobmatch-network
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Proxy inverso Nginx
  nginx:
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    container_name: jobmatch-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - jobmatch-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped